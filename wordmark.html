<!doctype html>
<html><head><meta charset="utf-8"><title>SAM Play wordmark</title>
<style>
  body { margin: 0; background: #F2ECDE; display: grid; place-items: center; height: 100vh; }
  .wm { display: flex; align-items: baseline; gap: 18px; }
  .sam { font: 800 144px/0.9 "Cosmica", system-ui, sans-serif; letter-spacing: 0.18em; color: #0E0E0C; }
  .play { font: 400 96px/0.9 "Self Modern", "Cormorant Garamond", Georgia, serif; font-style: italic; color: #E84B2A; letter-spacing: -0.02em; transform: rotate(-3deg); transform-origin: bottom left; }
  .dot { width: 16px; height: 16px; background: #E84B2A; border-radius: 999px; align-self: center; }
</style></head>
<body>
<div class="wm"><span class="sam">S A M</span><span class="dot"></span><span class="play">play</span></div>
</body></html>
